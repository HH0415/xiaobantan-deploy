<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小半天 - 重設密碼</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico/favicon.ico.png">
    <link rel="stylesheet" href="css/auth.css">
    <script src="js/reset.js" defer></script>
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo">
                <span class="brand-title">小半天</span>
                <span class="brand-sub">XIAOBANTAN</span>
            </div>

            <div class="auth-box">
                <h2 class="auth-title">重設密碼</h2>
                <p class="auth-subtitle">請輸入您的新密碼，設定完成後即可重新登入。</p>

                <form id="resetForm">
                    <div class="form-group">
                        <label for="newPassword">新密碼</label>
                        <input type="password" id="newPassword" placeholder="請輸入新密碼" required>
                    </div>
                    
                    <button type="submit" class="btn-auth">確認重設密碼</button>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
